<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学术MBTI：测测你的导师属于哪一类？ | Original</title>
    <meta name="description" content="32题深度解析你的导师风格，测测他是学术活菩萨还是深渊监考官。">
    
    <style>
        :root { 
            --primary: #2c3e50; --accent: #3498db; --success: #2ecc71;
            --bg: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); --text: #2c3e50; 
        }

        body { 
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; 
            background: var(--bg); color: var(--text); margin: 0; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; -webkit-tap-highlight-color: transparent;
            user-select: none; -webkit-user-select: none;
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom);
        }

        #app { 
            background: rgba(255, 255, 255, 0.92); padding: 40px 30px; 
            border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); 
            max-width: 480px; width: 100%; backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* 计数器 */
        .counter-box { font-size: 11px; color: #95a5a6; margin-bottom: 15px; display: flex; align-items: center; gap: 5px; }
        .counter-box img { height: 16px; filter: grayscale(1) opacity(0.6); }

        /* 进度条：统一显示第 X / 32 题 */
        .progress-container { margin-bottom: 35px; }
        .progress-bar { height: 6px; background: rgba(0,0,0,0.05); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--success)); width: 0%; transition: width 0.3s ease; }
        .progress-text { font-size: 13px; color: #7f8c8d; margin-top: 10px; font-weight: 600; }

        h2 { font-size: clamp(1.1rem, 4vw, 1.25rem); line-height: 1.6; margin-bottom: 30px; min-height: 60px; color: var(--primary); }

        .options { display: flex; flex-direction: column; gap: 12px; }
        .opt-btn { 
            background: white; border: 1px solid rgba(0,0,0,0.08); 
            padding: 16px 20px; border-radius: 14px; cursor: pointer; 
            transition: all 0.2s ease; font-size: 15px; text-align: left;
            font-weight: 500; color: #444;
        }
        .opt-btn:hover { border-color: var(--accent); background: #f8fbff; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(52, 152, 219, 0.1); }
        .opt-btn:active { transform: scale(0.98); }

        /* 结果页 */
        #result { display: none; text-align: center; animation: fadeIn 0.6s ease; }
        .type-code { font-size: 3.5rem; color: var(--accent); font-weight: 800; margin: 5px 0; }
        .type-name { font-size: 1.6rem; color: var(--primary); margin-bottom: 20px; font-weight: 700; }
        
        /* 能量条样式 */
        .stats-container { margin: 25px 0; background: #fdfdfd; padding: 20px; border-radius: 15px; }
        .stat-row { margin-bottom: 12px; }
        .stat-label { display: flex; justify-content: space-between; font-size: 12px; color: #7f8c8d; margin-bottom: 5px; }
        .stat-track { height: 4px; background: #eee; border-radius: 2px; overflow: hidden; }
        .stat-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 1s ease-out; }

        .type-desc { font-size: 14px; line-height: 1.8; color: #555; text-align: left; background: rgba(52, 152, 219, 0.05); padding: 20px; border-radius: 15px; border-left: 5px solid var(--accent); margin-bottom: 30px; }
        .btn-retry { background: var(--primary); color: white; border: none; padding: 14px 40px; border-radius: 30px; cursor: pointer; font-size: 16px; font-weight: 600; }

        .footer { font-size: 11px; color: #bdc3c7; margin-top: 40px; text-align: center; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="app">
    <div id="quiz-ui">
        <div class="counter-box">
            已有 <img src="https://count.getloli.com/get/@academic-mbti-original?theme=asoul" alt="count"> 位同门参与测试
        </div>

        <div class="progress-container">
            <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
            <div class="progress-text" id="progress-val">第 1 / 32 题</div>
        </div>
        
        <div id="question-area">
            </div>
    </div>

    <div id="result">
        <p style="font-size: 14px; color: #95a5a6; margin-bottom: 0;">您的导师属于</p>
        <div class="type-code" id="res-code"></div>
        <div class="type-name" id="res-name"></div>
        
        <div class="stats-container" id="res-stats">
            </div>

        <div class="type-desc" id="res-desc"></div>
        <button class="btn-retry" id="retry-btn">再测一次</button>
        <p class="footer">© 2026 Academic-MBTI Original@macroecology@163.com <br>请尊重原创，转发请注明出处</p>
    </div>
</div>

<script>
// --- 1. 配置与数据 ---
const STORAGE_KEY = 'advisor_quiz_progress';
const QUESTIONS_PER_DIM = 8; 
const THRESHOLD = 3.2; // 赋分阈值整改：平均分需超过3.2才判定为高位

const questions = [
    {q: "1. 导师对你论文初稿的修改意见是否能细致到标点符号、图表格式？", d: "A"},
    {q: "2. 导师是否能清晰记得你上周实验的具体进展或具体数据？", d: "A"},
    {q: "3. 你和导师进行学术讨论或进度汇报的频率（含微信/邮件交互）是否很高？", d: "A"},
    {q: "4. 导师是否会亲自帮你推导公式、检查实验代码或演示实验操作？", d: "A"},
    {q: "5. 导师对你课题进度的掌控欲和催促程度，是否比你本人还要紧迫？", d: "A"},
    {q: "6. 在组会上，导师是否会针对你的汇报细节提出深度的技术性追问？", d: "A"},
    {q: "7. 当你学术卡壳时，导师给出的反馈是具体的实操建议而非宽泛的空话？", d: "A"},
    {q: "8. 在面对高难度的审稿意见或课题瓶颈时，导师是否会亲自参与回复论证或方案调整？", d: "A"},
    {q: "9. 当你因身体不适请假或遭遇突发私事时，导师的首要反应是表示关怀而非追问进度？", d: "E"},
    {q: "10. 导师是否会主动关心你的心理压力、科研焦虑或未来的职业规划？", d: "E"},
    {q: "11. 在论文署名或成果分配时，导师是否能确保学生的贡献得到公平体现且不抢占成果？", d: "E"},
    {q: "12. 当你遭遇实验失败情绪低落时，导师是否能有效安抚、共情而非一味施压？", d: "E"},
    {q: "13. 实验室的日常气氛是否相对轻松，而非等级森严、让学生感到如履薄冰？", d: "E"},
    {q: "14. 当你提出想尝试大厂实习、考公或跨学科方向时，导师是否持积极支持的态度？", d: "E"},
    {q: "15. 导师从不在公开场合通过贬低、羞辱或“公开处刑”的方式来激励学生？", d: "E"},
    {q: "16. 导师是否会像长辈一样，在合适时机和你分享一些人生感悟或生活琐事？", d: "E"},
    {q: "17. 实验室的劳务费和补助水平是否在单位内位居前列，且能准时、足额发放？", d: "G"},
    {q: "18. 课题组是否经常组织由导师买单的团建聚餐、零食水果或节假日福利？", d: "G"},
    {q: "19. 申请购买必要的昂贵试剂、尖端设备或计算资源时，导师是否批复爽快？", d: "G"},
    {q: "20. 导师是否愿意资助并鼓励你参加线下（含异地、出国）的高水平学术会议？", d: "G"},
    {q: "21. 导师是否经常动用个人人脉、社会资源帮组内学生内推工作或联系深造机会？", d: "G"},
    {q: "22. 实验室的硬件环境（电脑配置、人体工学椅等）是否舒适大方？", d: "G"},
    {q: "23. 报销流程在导师这里是否顺畅，不会因为几块钱的打车票或杂费计较半天？", d: "G"},
    {q: "24. 考虑到导师提供的平台和资源，组内/校内学生是否普遍认为留校深造是一个极具竞争力的选择？", d: "G"},
    {q: "25. 导师对你的工作不满意时，是否会心平气和告知具体原因而非让你回家“自悟”？", d: "D"},
    {q: "26. 导师的微信/邮件回复是否简单明确（如“收到”、“不行”），从不让你猜测意图？", d: "D"},
    {q: "27. 当导师说“你可以再改改”时，你是否确信这只是建议而非带强制性的命令？", d: "D"},
    {q: "28. 导师是否从不在背地里通过其他同门，向你传达对你的负面评价或不满？", d: "D"},
    {q: "29. 毕业的标准（如论文篇数）是否在入学初期就明确，且不会随时间随意加码？", d: "D"},
    {q: "30. 导师的情绪是否相对稳定，不会因为个人压力或私事而突然迁怒于学生？", d: "D"},
    {q: "31. 你是否能随时（或在约定时间内）直接走进办公室讨论问题，无需复杂的心理建设？", d: "D"},
    {q: "32. 导师对于组内规矩、权力边界的界定是否清晰透明，没有所谓的“潜规则”？", d: "D"}
];

const resultLib = {
    "AEGD": { name: "学术活菩萨", desc: "【顶配导师】 既给你搬砖的钱，又教你砌墙的技术。他署名慷慨，说话直球，组内基本都是硕转博的“回头客”。" },
    "AEGS": { name: "温柔陷阱师", desc: "【高情商掌控者】 态度极好，甚至会帮你改标点符号，但他说话极其委婉。当他微笑着说“要不你再调研一下”时，其实是在否定你的方案。" },
    "AELD": { name: "清贫老学究", desc: "【学术纯粹主义】 没钱发补助，但会亲自带你做实验。他虽然严苛但很有原则，不抢成果。" },
    "AELS": { name: "儒雅苦行僧", desc: "【理想主义隐士】 沟通像打禅机，不社交不接活，组内资源极度匮乏。他能给你的帮助仅限于学术讨论。" },
    "ARGD": { name: "硬核学术暴君", desc: "【高压产出机】 资源顶级，署名公平，但脾气暴躁。只要你能扛住精神压力，他能把你送上学术巅峰。" },
    "ARGS": { name: "冷面笑虎", desc: "【PUA 高级玩家】 给你钱和平台，但说话永远绕弯子，通过贬低来“激励”学生。" },
    "ARLD": { name: "严苛包工头", desc: "【苦力收割者】 没钱没资源却管得极细。他把学生当成廉价劳动力，毕业标准不仅高而且模糊。" },
    "ARLS": { name: "阴阳剪刀手", desc: "【精神消耗器】 经常失踪，一出现就拿着剪刀把你的论文剪得稀碎。说话极其阴阳怪气。" },
    "IEGD": { name: "开明金主爸爸", desc: "【最佳就业导师】 学术上基本放羊，但他有资源、发钱爽快，且支持你出去实习。" },
    "IEGS": { name: "随缘大善人", desc: "【佛系放生者】 实验室基本处于“无政府状态”。他不催进度、不抢成果。适合想考公或跨界发展的奇才。" },
    "IELD": { name: "无为而治者", desc: "【学术透明人】 没指导也没钱，既不给你制造麻烦也不给你提供帮助。全靠学生自救。" },
    "IELS": { name: "隐身世外高人", desc: "【神秘挂名符】 偶尔在群里转发链接。他可能在校外有极高头衔，但对你毫无实际支撑。" },
    "IRGD": { name: "失踪的 CEO", desc: "【外包项目经理】 只有在要报表时才闪现。只要干活，钱和毕业一般不会亏待你。" },
    "IRGS": { name: "隐形收割机", desc: "【成果掠夺者】 平时找不到人，发论文时突然要求一作。他说话云山雾罩，实际上是在模糊权责。" },
    "IRLD": { name: "学术房东", desc: "【挂名包租公】 没指导、没钱、没资源。他只提供一个工位，毕业时还要你交出高质量答卷。" },
    "IRLS": { name: "深渊监考官", desc: "【负能量黑洞】 无法提供有效指导，只会质疑你的智商和进度。不给资源却要求顶级成果。" }
};

// --- 2. 逻辑核心 ---
let currentIdx = 0;
let scores = { A: 0, E: 0, G: 0, D: 0 };

function init() {
    loadState();
    renderQuestion();
    document.getElementById('retry-btn').addEventListener('click', resetQuiz);
}

function renderQuestion() {
    const q = questions[currentIdx];
    const area = document.getElementById('question-area');
    area.innerHTML = `
        <div class="question-card active">
            <h2>${q.q}</h2>
            <div class="options">
                <button class="opt-btn" onclick="handleNext(5)">🔥 非常符合</button>
                <button class="opt-btn" onclick="handleNext(4)">👍 比较符合</button>
                <button class="opt-btn" onclick="handleNext(3)">😐 一般 / 看情况</button>
                <button class="opt-btn" onclick="handleNext(2)">👎 比较不符合</button>
                <button class="opt-btn" onclick="handleNext(1)">❌ 完全不符合</button>
            </div>
        </div>
    `;
    updateProgressUI();
}

function handleNext(val) {
    const dim = questions[currentIdx].d;
    scores[dim] += val;
    
    if (currentIdx < questions.length - 1) {
        currentIdx++;
        saveState();
        renderQuestion();
    } else {
        clearState();
        showResult();
    }
}

function updateProgressUI() {
    const total = questions.length;
    const current = currentIdx + 1;
    const pct = (currentIdx / total) * 100;
    document.getElementById('progress').style.width = pct + '%';
    document.getElementById('progress-val').innerText = `第 ${current} / ${total} 题`;
}

function showResult() {
    document.getElementById('quiz-ui').style.display = 'none';
    
    // 赋分整改逻辑：平均分判定
    const code = 
        (scores.A / QUESTIONS_PER_DIM > THRESHOLD ? 'A' : 'I') +
        (scores.E / QUESTIONS_PER_DIM > THRESHOLD ? 'E' : 'R') +
        (scores.G / QUESTIONS_PER_DIM > THRESHOLD ? 'G' : 'L') +
        (scores.D / QUESTIONS_PER_DIM > THRESHOLD ? 'D' : 'S');
    
    const res = resultLib[code] || resultLib["IELD"];
    document.getElementById('res-code').innerText = code;
    document.getElementById('res-name').innerText = res.name;
    document.getElementById('res-desc').innerText = res.desc;

    // 渲染能量柱 (1-5分映射到 0-100%)
    const dims = [
        { label: '学术参与', key: 'A', icon: '📚' },
        { label: '情感支持', key: 'E', icon: '❤️' },
        { label: '资源获取', key: 'G', icon: '💰' },
        { label: '沟通清晰', key: 'D', icon: '💬' }
    ];
    
    document.getElementById('res-stats').innerHTML = dims.map(d => {
        const avg = scores[d.key] / QUESTIONS_PER_DIM;
        const pct = Math.round(((avg - 1) / 4) * 100); // 最小1分(0%), 最大5分(100%)
        return `
            <div class="stat-row">
                <div class="stat-label"><span>${d.icon} ${d.label}</span><span>${pct}%</span></div>
                <div class="stat-track"><div class="stat-bar" style="width: ${pct}%"></div></div>
            </div>
        `;
    }).join('');

    document.getElementById('result').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// --- 3. 辅助功能 ---
function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ currentIdx, scores }));
}

function loadState() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    try {
        const data = JSON.parse(raw);
        currentIdx = data.currentIdx || 0;
        scores = data.scores || { A: 0, E: 0, G: 0, D: 0 };
    } catch (e) {}
}

function clearState() { localStorage.removeItem(STORAGE_KEY); }

function resetQuiz() {
    clearState();
    location.reload();
}

init();
</script>
</body>
</html>
