<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学术MBTI：测测你的导师属于哪一类？</title>
    <style>
        :root { 
            --primary: #2c3e50; 
            --accent: #3498db; 
            --success: #2ecc71;
            --bg: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            --text: #2c3e50; 
        }

        body { 
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            -webkit-tap-highlight-color: transparent;
        }

        #app { 
            background: rgba(255, 255, 255, 0.9); 
            padding: 40px 30px; 
            border-radius: 24px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.1); 
            max-width: 480px; 
            width: 90%; 
            margin: 20px auto; 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* 进度条美化 */
        .progress-container { margin-bottom: 35px; }
        .progress-bar { height: 8px; background: rgba(0,0,0,0.05); border-radius: 10px; overflow: hidden; }
        .progress-fill { 
            height: 100%; 
            background: linear-gradient(90deg, var(--accent), var(--success)); 
            width: 0%; 
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.3);
        }
        .progress-text { font-size: 13px; color: #7f8c8d; margin-top: 10px; font-weight: 500; }

        .question-card { display: none; }
        .question-card.active { display: block; animation: slideUp 0.5s ease; }

        h2 { font-size: 1.25rem; line-height: 1.5; margin-bottom: 35px; min-height: 70px; color: var(--primary); }

        /* 选项按钮美化 */
        .options { display: flex; flex-direction: column; gap: 14px; }
        .opt-btn { 
            background: white; 
            border: 1px solid rgba(0,0,0,0.05); 
            padding: 16px 20px; 
            border-radius: 14px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            font-size: 15px; 
            text-align: left;
            font-weight: 500;
            color: #444;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .opt-btn:hover { 
            border-color: var(--accent); 
            background: #f8fbff; 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.1);
        }
        .opt-btn:active { transform: scale(0.98); }

        /* 结果页美化 */
        #result { display: none; text-align: center; animation: fadeIn 0.8s ease; }
        .result-badge {
            width: 80px; height: 80px; background: var(--accent); margin: 0 auto 20px;
            clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
            animation: rotateBg 15s infinite linear;
        }
        .type-code { font-size: 3.5rem; color: var(--accent); font-weight: 800; margin: 5px 0; letter-spacing: -1px; }
        .type-name { font-size: 1.6rem; color: var(--primary); margin-bottom: 20px; font-weight: 700; }
        
        /* 维度能量柱 */
        .stats-container { display: flex; justify-content: space-between; margin: 25px 0; background: #fdfdfd; padding: 15px; border-radius: 12px; }
        .stat-item { flex: 1; font-size: 12px; color: #7f8c8d; }
        .stat-emoji { font-size: 20px; display: block; margin-bottom: 5px; }

        .type-desc { 
            font-size: 14px; line-height: 1.8; color: #555; text-align: left; 
            background: rgba(52, 152, 219, 0.05); padding: 20px; border-radius: 15px; 
            border-left: 5px solid var(--accent); margin-bottom: 30px;
        }

        .btn-retry { 
            background: var(--primary); color: white; border: none; 
            padding: 14px 40px; border-radius: 30px; cursor: pointer; 
            font-size: 16px; font-weight: 600; transition: 0.3s;
        }
        .btn-retry:hover { opacity: 0.9; transform: translateY(-2px); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes rotateBg { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .footer { font-size: 11px; color: #bdc3c7; margin-top: 40px; text-align: center; line-height: 1.5; }
    </style>
</head>
<body>

<div id="app">
    <div id="quiz-ui">
        <div class="progress-container">
            <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
            <div class="progress-text" id="progress-val">1 / 32</div>
        </div>
        <div id="question-area"></div>
    </div>

    <div id="result">
        <div class="result-badge"></div>
        <p style="font-size: 14px; color: #95a5a6; margin-bottom: 0;">你的导师类型是</p>
        <div class="type-code" id="res-code"></div>
        <div class="type-name" id="res-name"></div>
        
        <div class="stats-container" id="res-stats"></div>

        <div class="type-desc" id="res-desc"></div>
        <button class="btn-retry" onclick="location.reload()">再测一次</button>
        <p class="footer">本测试结果仅供参考<br>分享到朋友圈，看看同门的导师是什么样？</p>
    </div>
</div>

<script>
// 完整题库数据 [cite: 5-12, 15-22, 25-32, 35-42]
const questions = [
    {q: "1. 导师对你论文初稿的修改意见是否能细致到标点符号、图表格式？", d: "A"},
    {q: "2. 导师是否能清晰记得你上周实验的具体进展或具体数据？", d: "A"},
    {q: "3. 你和导师进行学术讨论或进度汇报的频率（含微信/邮件交互）是否很高？", d: "A"},
    {q: "4. 导师是否会亲自帮你推导公式、检查实验代码或演示实验操作？", d: "A"},
    {q: "5. 导师对你课题进度的掌控欲和催促程度，是否比你本人还要紧迫？", d: "A"},
    {q: "6. 在组会上，导师是否会针对你的汇报细节提出深度的技术性追问？", d: "A"},
    {q: "7. 当你学术卡壳时，导师给出的反馈是具体的实操建议而非宽泛的空话？", d: "A"},
    {q: "8. 在面对高难度的审稿意见或课题瓶颈时，导师是否会亲自参与回复论证或方案调整？", d: "A"},
    {q: "9. 当你因身体不适请假或遭遇突发私事时，导师的首要反应是表示关怀而非追问进度？", d: "E"},
    {q: "10. 导师是否会主动关心你的心理压力、科研焦虑或未来的职业规划？", d: "E"},
    {q: "11. 在论文署名或成果分配时，导师是否能确保学生的贡献得到公平体现且不抢占成果？", d: "E"},
    {q: "12. 当你遭遇实验失败情绪低落时，导师是否能有效安抚、共情而非一味施压？", d: "E"},
    {q: "13. 实验室的日常气氛是否相对轻松，而非等级森严、让学生感到如履薄冰？", d: "E"},
    {q: "14. 当你提出想尝试大厂实习、考公或跨学科方向时，导师是否持积极支持的态度？", d: "E"},
    {q: "15. 导师是否从不在公开场合通过贬低、羞辱或“公开处刑”的方式来激励学生？", d: "E"},
    {q: "16. 导师是否会像长辈一样，在合适时机和你分享一些人生感悟或生活琐事？", d: "E"},
    {q: "17. 实验室的劳务费和补助水平是否在单位内位居前列，且能准时、足额发放？", d: "G"},
    {q: "18. 课题组是否经常组织由导师买单的团建聚餐、零食水果或节假日福利？", d: "G"},
    {q: "19. 申请购买必要的昂贵试剂、尖端设备或计算资源时，导师是否批复爽快？", d: "G"},
    {q: "20. 导师是否愿意资助并鼓励你参加线下（含异地、出国）的高水平学术会议？", d: "G"},
    {q: "21. 导师是否经常动用个人人脉、社会资源帮组内学生内推工作或联系深造机会？", d: "G"},
    {q: "22. 实验室的硬件环境（电脑配置、人体工学椅等）是否舒适大方？", d: "G"},
    {q: "23. 报销流程在导师这里是否顺畅，不会因为几块钱的打车票或杂费计较半天？", d: "G"},
    {q: "24. 考虑到导师提供的平台和资源，组内/校内学生是否普遍认为留校深造是一个极具竞争力的选择？", d: "G"},
    {q: "25. 导师对你的工作不满意时，是否会心平气和告知具体原因而非让你回家“自悟”？", d: "D"},
    {q: "26. 导师的微信/邮件回复是否简单明确（如“收到”、“不行”），从不让你猜测意图？", d: "D"},
    {q: "27. 当导师说“你可以再改改”时，你是否确信这只是建议而非带强制性的命令？", d: "D"},
    {q: "28. 导师是否从不在背地里通过其他同门，向你传达对你的负面评价或不满？", d: "D"},
    {q: "29. 毕业的标准（如论文篇数）是否在入学初期就明确，且不会随时间随意加码？", d: "D"},
    {q: "30. 导师的情绪是否相对稳定，不会因为个人压力或私事而突然迁怒于学生？", d: "D"},
    {q: "31. 你是否能随时（或在约定时间内）直接走进办公室讨论问题，无需复杂的心理建设？", d: "D"},
    {q: "32. 导师对于组内规矩、权力边界的界定是否清晰透明，没有所谓的“潜规则”？", d: "D"}
];

// 分类文案库 [cite: 45, 47]
const resultLib = {
    "AEGD": { name: "学术活菩萨", desc: "【顶配导师】 既给你搬砖的钱，又教你砌墙的技术。他署名慷慨，说话直球，组内基本都是硕转博的“回头客”。在他手下，你只需要努力，剩下的他都会帮你搞定。" },
    "AEGS": { name: "温柔陷阱师", desc: "【高情商掌控者】 态度极好，甚至会帮你改标点符号，但他说话极其委婉。当他微笑着说“要不你再调研一下”时，其实是在否定你的方案。在他组里，你需要极强的“听力”来拆解潜台词。" },
    "AELD": { name: "清贫老学究", desc: "【学术纯粹主义】 没钱发补助，实验室椅子可能都是坏的，但他会亲自带你做实验。他虽然严苛但很有原则，不抢成果。适合对学术有真爱、能忍受物质清贫的同学。" },
    "AELS": { name: "儒雅苦行僧", desc: "【理想主义隐士】 沟通像打禅机，不社交不接活，组内资源极度匮乏。他虽然关心你，但能给你的帮助仅限于学术讨论。在他组里，你需要自己解决就业和生活费。" },
    "ARGD": { name: "硬核学术暴君", desc: "【高压产出机】 资源顶级，署名公平，但脾气暴躁。凌晨三点发微信，组会像审讯。只要你能扛住精神压力，他能把你送上学术巅峰，是“学术特种兵”的首选。" },
    "ARGS": { name: "冷面笑虎", desc: "【PUA 高级玩家】 给你钱和平台，但说话永远绕弯子，通过贬低来“激励”学生。他可能在署名上比较强势，让你时刻处于自我怀疑中。在他手下，记得建立心理防线。" },
    "ARLD": { name: "严苛包工头", desc: "【苦力收割者】 没钱没资源却管得极细。他把学生当成廉价劳动力，毕业标准不仅高而且模糊。这是最容易产生冲突的类型，建议保持最低限度沟通，保命毕业。" },
    "ARLS": { name: "阴阳剪刀手", desc: "【精神消耗器】 经常失踪，一出现就拿着剪刀（红笔）把你的论文剪得稀碎。说话极其阴阳怪气，不给补助还嫌你干活慢。这是读研路上最需要防备的“深坑”。" },
    "IEGD": { name: "开明金主爸爸", desc: "【最佳就业导师】 学术上完全不管，但他有资源、有项目、发钱爽快，且支持你出去实习。只要你不嫌弃他没指导，他就是你进入职场最强有力的跳板。" },
    "IEGS": { name: "随缘大善人", desc: "【佛系放生者】 实验室基本处于“无政府状态”。他不催进度、不抢成果，甚至忘了你是谁。适合自律性极强、且想利用研究生身份考公或跨界发展的奇才。" },
    "IELD": { name: "无为而治者", desc: "【学术透明人】 没指导也没钱，既不给你制造麻烦也不给你提供帮助。这种“双盲”状态下，你必须具备极强的自救能力，甚至要自己去联系外导。" },
    "IELS": { name: "隐身世外高人", desc: "【神秘挂名符】 偶尔在群里转发个链接，说话高深莫测。他可能在校外有极高头衔，但对你毫无实际支撑。在他组里，你就是个拥有“名师子弟”头衔的独行侠。" },
    "IRGD": { name: "失踪的 CEO", desc: "【外包项目经理】 只有在要报表（实验结果）时才闪现。他把你当成项目外包人员，语气生硬直接。虽然没有温情，但只要干活，钱和毕业一般不会亏待你。" },
    "IRGS": { name: "隐形收割机", desc: "【成果掠夺者】 平时找不到人，发论文时突然出现要求一作或通讯。他说话云山雾罩，实际上是在模糊权责。在他手下，必须保留好沟通证据，保护自己的劳动成果。" },
    "IRLD": { name: "学术房东", desc: "【挂名包租公】 没指导、没钱、没资源。他只提供一个工位（收房租），毕业时还要你交出一份高质量答卷。这是典型的“零投入高回报”导师，学生自救难度极大。" },
    "IRLS": { name: "深渊监考官", desc: "【负能量黑洞】 无法提供有效指导，偶尔“指导”就是为了质疑你的智商和进度。不给任何资源却要求你做出顶级成果。遇到这种导师，请尽早寻找副导师或校外支援。" }
};

let currentIdx = 0;
let scores = { A: 0, E: 0, G: 0, D: 0 };

function renderQuestion() {
    const q = questions[currentIdx];
    const container = document.getElementById('question-area');
    container.innerHTML = `
        <div class="question-card active">
            <h2>${q.q}</h2>
            <div class="options">
                <button class="opt-btn" onclick="next(5)">🔥 非常符合</button>
                <button class="opt-btn" onclick="next(4)">👍 比较符合</button>
                <button class="opt-btn" onclick="next(3)">😐 一般 / 看情况</button>
                <button class="opt-btn" onclick="next(2)">👎 比较不符合</button>
                <button class="opt-btn" onclick="next(1)">❌ 完全不符合</button>
            </div>
        </div>
    `;
    updateProgress();
}

function updateProgress() {
    const p = ((currentIdx) / questions.length) * 100;
    document.getElementById('progress').style.width = p + '%';
    document.getElementById('progress-val').innerText = `已完成进度：${Math.round(p)}%`;
}

function next(val) {
    const dim = questions[currentIdx].d;
    scores[dim] += val;
    
    if (currentIdx < questions.length - 1) {
        currentIdx++;
        renderQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById('quiz-ui').style.display = 'none';
    
    const code = (scores.A >= 24 ? 'A' : 'I') + 
                 (scores.E >= 24 ? 'E' : 'R') + 
                 (scores.G >= 24 ? 'G' : 'L') + 
                 (scores.D >= 24 ? 'D' : 'S');
    
    const res = resultLib[code];
    document.getElementById('res-code').innerText = code;
    document.getElementById('res-name').innerText = res.name;
    document.getElementById('res-desc').innerText = res.desc;

    // 动态生成能量数据
    const statsHtml = `
        <div class="stat-item"><span class="stat-emoji">${scores.A >= 24 ? '📚' : '🍃'}</span>学术: ${scores.A >= 24 ? '高' : '低'}</div>
        <div class="stat-item"><span class="stat-emoji">${scores.E >= 24 ? '❤️' : '🗿'}</span>情感: ${scores.E >= 24 ? '暖' : '冷'}</div>
        <div class="stat-item"><span class="stat-emoji">${scores.G >= 24 ? '💰' : '📦'}</span>资源: ${scores.G >= 24 ? '壕' : '紧'}</div>
        <div class="stat-item"><span class="stat-emoji">${scores.D >= 24 ? '💬' : '🌫️'}</span>沟通: ${scores.D >= 24 ? '直' : '绕'}</div>
    `;
    document.getElementById('res-stats').innerHTML = statsHtml;
    
    document.getElementById('result').style.display = 'block';
    window.scrollTo(0, 0);
}

renderQuestion();
</script>
</body>
</html>
